name: 📥 دانلود از تلگرام

on:
  workflow_dispatch:
    inputs:
      telegram_url:
        description: '🔗 لینک تلگرام (مثال: https://t.me/channel/123)'
        required: true
        type: string
      persian_title:
        description: '📝 عنوان فارسی (برای نام پوشه)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 نصب وابستگی‌ها
        run: |
          pip install telethon
          sudo apt-get update
          sudo apt-get install -y rar

      - name: 📥 دانلود فایل
        run: python download.py "${{ github.event.inputs.telegram_url }}" "${{ github.event.inputs.persian_title }}"

      - name: 📦 تقسیم فایل‌های بزرگ به RAR
        run: |
          cd downloads
          for folder in */; do
            if [ -d "$folder" ]; then
              cd "$folder"
              for file in *; do
                if [ -f "$file" ] && [ "$file" != "README.md" ]; then
                  size=$(stat -c%s "$file")
                  if [ $size -gt 94371840 ]; then
                    echo "📦 در حال تقسیم $file ($(($size/1024/1024))MB)..."
                    rar a -v90m -ep "${file%.*}.rar" "$file"
                    rm "$file"
                  fi
                fi
              done
              cd ..
            fi
          done
          echo "✅ لیست فایل‌ها:"
          ls -laR

      - name: 📝 بروزرسانی README پوشه‌ها
        run: python update_folder_readme.py

      - name: 💾 ذخیره فایل‌های دانلود شده
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "📥 دانلود شد: ${{ github.event.inputs.persian_title || github.event.inputs.telegram_url }}" || echo "❌ تغییری وجود ندارد"
          git push
